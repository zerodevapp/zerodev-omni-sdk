name: Publish native libraries

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$BASE" >> $GITHUB_ENV
          echo "TAG=native-v$BASE" >> $GITHUB_ENV
          echo "Building native libs: $BASE"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Switch to CommandLineTools
        run: sudo xcode-select -s /Library/Developer/CommandLineTools

      - name: Cross-compile and package
        run: |
          for target in aarch64-macos x86_64-macos x86_64-linux-gnu aarch64-linux-gnu; do
            echo "=== Building $target ==="
            rm -rf zig-out
            zig build -Doptimize=ReleaseFast -Dtarget=$target -Dstatic-only=true

            # Determine platform tag
            case "$target" in
              aarch64-macos) tag="aarch64-macos" ;;
              x86_64-macos)  tag="x86_64-macos" ;;
              x86_64-linux-gnu)  tag="x86_64-linux" ;;
              aarch64-linux-gnu) tag="aarch64-linux" ;;
            esac

            # Repack archives for macOS linker compatibility
            if [[ "$target" == *macos* ]]; then
              for lib in libzerodev_aa.a libsecp256k1.a; do
                tmpdir=$(mktemp -d)
                cd "$tmpdir"
                ar x "$GITHUB_WORKSPACE/zig-out/lib/$lib"
                chmod 644 *.o
                libtool -static -o "$GITHUB_WORKSPACE/zig-out/lib/$lib" *.o 2>/dev/null
                cd "$GITHUB_WORKSPACE"
                rm -rf "$tmpdir"
              done
            fi

            # Package: tarball with .a files + header
            mkdir -p dist
            tar czf "dist/zerodev-aa-native-${tag}.tar.gz" \
              -C zig-out/lib libzerodev_aa.a libsecp256k1.a \
              -C "$GITHUB_WORKSPACE" include/aa.h

            echo "Packaged: dist/zerodev-aa-native-${tag}.tar.gz"
          done

          echo "=== All packages ==="
          ls -la dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.TAG }}"

          # Delete existing release if any (allows re-running)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          # Create tag and release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" dist/*.tar.gz \
            --title "Native libraries v${{ env.VERSION }}" \
            --notes "Prebuilt static libraries for Rust and Go bindings.

          **Platforms:** macOS (arm64, x86_64), Linux (arm64, x86_64)

          Each tarball contains:
          - \`libzerodev_aa.a\` — main SDK
          - \`libsecp256k1.a\` — crypto dependency
          - \`include/aa.h\` — C header"
