name: Publish Rust to crates.io

on:
  workflow_dispatch: {}

jobs:
  native-libs:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$BASE" >> $GITHUB_ENV
          echo "TAG=native-v$BASE" >> $GITHUB_ENV

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Switch to CommandLineTools
        run: sudo xcode-select -s /Library/Developer/CommandLineTools

      - name: Cross-compile and package
        run: |
          for target in aarch64-macos x86_64-macos x86_64-linux-gnu aarch64-linux-gnu; do
            echo "=== Building $target ==="
            rm -rf zig-out
            zig build -Doptimize=ReleaseFast -Dtarget=$target -Dstatic-only=true

            case "$target" in
              aarch64-macos) tag="aarch64-macos" ;;
              x86_64-macos)  tag="x86_64-macos" ;;
              x86_64-linux-gnu)  tag="x86_64-linux" ;;
              aarch64-linux-gnu) tag="aarch64-linux" ;;
            esac

            if [[ "$target" == *macos* ]]; then
              for lib in libzerodev_aa.a libsecp256k1.a; do
                tmpdir=$(mktemp -d)
                cd "$tmpdir"
                ar x "$GITHUB_WORKSPACE/zig-out/lib/$lib"
                chmod 644 *.o
                libtool -static -o "$GITHUB_WORKSPACE/zig-out/lib/$lib" *.o 2>/dev/null
                cd "$GITHUB_WORKSPACE"
                rm -rf "$tmpdir"
              done
            fi

            mkdir -p dist
            tar czf "dist/zerodev-aa-native-${tag}.tar.gz" \
              -C zig-out/lib libzerodev_aa.a libsecp256k1.a \
              -C "$GITHUB_WORKSPACE" include/aa.h
          done

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.TAG }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" dist/*.tar.gz \
            --title "Native libraries v${{ env.VERSION }}" \
            --notes "Prebuilt static libraries for Rust binding."

  publish:
    needs: native-libs
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')

          git fetch --tags
          LATEST=$(git tag -l "rust-v${BASE}.*" | sort -t. -k5 -n | tail -1)
          if [ -n "$LATEST" ]; then
            BUILD=$(echo "$LATEST" | grep -o '[0-9]*$')
            BUILD=$((BUILD + 1))
          else
            BUILD=1
          fi

          VERSION="${BASE}.${BUILD}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Rust release: $VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update version in Cargo.toml
        run: |
          cd bindings/rust
          sed -i '' "s/^version = \".*\"/version = \"${{ env.VERSION }}\"/" Cargo.toml
          echo "Cargo version set to: ${{ env.VERSION }}"

      - name: Verify build (downloads native libs via build.rs)
        run: |
          cd bindings/rust
          cargo build --release

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd bindings/rust
          cargo publish --allow-dirty

      - name: Tag release
        run: |
          TAG="rust-v${{ env.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"
