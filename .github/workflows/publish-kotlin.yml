name: Publish Kotlin to Maven Central

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')

          git fetch --tags
          LATEST=$(git tag -l "kotlin-v${BASE}.*" | sort -t. -k5 -n | tail -1)
          if [ -n "$LATEST" ]; then
            BUILD=$(echo "$LATEST" | grep -o '[0-9]*$')
            BUILD=$((BUILD + 1))
          else
            BUILD=1
          fi

          VERSION="${BASE}.${BUILD}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Kotlin release: $VERSION"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Switch to CommandLineTools
        run: sudo xcode-select -s /Library/Developer/CommandLineTools

      - name: Cross-compile desktop native libraries (JNI)
        run: |
          RESOURCE_DIR=bindings/kotlin/src/main/resources
          JNI_SRC=bindings/kotlin/jni/zerodev_aa_jni.c
          JNI_INC="$JAVA_HOME/include"

          # Helper: build static libs with Zig, repack for macOS, compile JNI bridge
          build_desktop() {
            local zig_target="$1" platform_dir="$2" ext="$3" cc="$4" extra_flags="$5"

            echo "=== Building $zig_target ==="
            rm -rf zig-out
            zig build -Doptimize=ReleaseFast -Dtarget=$zig_target -Dstatic-only=true

            # Repack archives for Xcode linker compatibility (macOS only)
            if [[ "$ext" == "dylib" ]]; then
              for lib in libzerodev_aa.a libsecp256k1.a; do
                tmpdir=$(mktemp -d)
                cd "$tmpdir"
                ar x "$GITHUB_WORKSPACE/zig-out/lib/$lib"
                chmod 644 *.o
                libtool -static -o "$GITHUB_WORKSPACE/zig-out/lib/$lib" *.o 2>/dev/null
                cd "$GITHUB_WORKSPACE"
                rm -rf "$tmpdir"
              done
            fi

            # Compile JNI bridge + link with static libs
            mkdir -p "$RESOURCE_DIR/$platform_dir"
            $cc -shared -o "$RESOURCE_DIR/$platform_dir/libzerodev_aa.$ext" \
              -I"$JNI_INC" -I"$JNI_INC/darwin" -I"$JNI_INC/linux" -Iinclude \
              "$JNI_SRC" \
              $extra_flags \
              2>&1

            echo "Built: $RESOURCE_DIR/$platform_dir/libzerodev_aa.$ext"
          }

          # macOS arm64
          build_desktop "aarch64-macos" "darwin-aarch64" "dylib" "clang" \
            "-target arm64-apple-macos11 -Wl,-force_load,zig-out/lib/libzerodev_aa.a -Wl,-force_load,zig-out/lib/libsecp256k1.a"

          # macOS x86_64
          build_desktop "x86_64-macos" "darwin-x86-64" "dylib" "clang" \
            "-target x86_64-apple-macos11 -Wl,-force_load,zig-out/lib/libzerodev_aa.a -Wl,-force_load,zig-out/lib/libsecp256k1.a"

          # Linux x86_64 (use zig cc as cross-compiler)
          build_desktop "x86_64-linux-gnu" "linux-x86-64" "so" "zig cc -target x86_64-linux-gnu" \
            "-Wl,--whole-archive zig-out/lib/libzerodev_aa.a zig-out/lib/libsecp256k1.a -Wl,--no-whole-archive -lc -lm"

          # Linux arm64 (use zig cc as cross-compiler)
          build_desktop "aarch64-linux-gnu" "linux-aarch64" "so" "zig cc -target aarch64-linux-gnu" \
            "-Wl,--whole-archive zig-out/lib/libzerodev_aa.a zig-out/lib/libsecp256k1.a -Wl,--no-whole-archive -lc -lm"

          echo "=== Desktop native libraries ==="
          find "$RESOURCE_DIR" -type f -name "libzerodev_aa.*" | sort

      - name: Cross-compile Android native libraries (JNI)
        run: |
          RESOURCE_DIR=bindings/kotlin/src/main/resources
          JNI_SRC=bindings/kotlin/jni/zerodev_aa_jni.c
          JNI_INC="$JAVA_HOME/include"

          NDK_HOME="${ANDROID_NDK_HOME:-$(ls -d $ANDROID_HOME/ndk/*/ 2>/dev/null | sort -V | tail -1)}"
          NDK_HOME="${NDK_HOME%/}"
          if [ -z "$NDK_HOME" ]; then
            echo "::error::Android NDK not found"
            exit 1
          fi
          SYSROOT="$NDK_HOME/toolchains/llvm/prebuilt/darwin-x86_64/sysroot"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/darwin-x86_64/bin"
          echo "Using NDK: $NDK_HOME"

          for target_info in "aarch64:aarch64-linux-android:aarch64-linux-android21-clang:android-aarch64" \
                             "x86_64:x86_64-linux-android:x86_64-linux-android21-clang:android-x86-64"; do
            IFS=: read -r arch zig_target ndk_cc res_dir <<< "$target_info"
            echo "=== Building $zig_target ==="

            # Step 1: Zig builds static libs
            rm -rf zig-out
            C_INCLUDE_PATH="$SYSROOT/usr/include:$SYSROOT/usr/include/$arch-linux-android" \
              zig build -Doptimize=ReleaseFast -Dtarget=$zig_target -Dstatic-only=true \
              --sysroot "$SYSROOT"

            # Step 2: NDK clang compiles JNI bridge + links everything into .so
            mkdir -p "$RESOURCE_DIR/$res_dir"
            "$TOOLCHAIN/$ndk_cc" -shared -o "$RESOURCE_DIR/$res_dir/libzerodev_aa.so" \
              -I"$JNI_INC" -I"$JNI_INC/darwin" -I"$JNI_INC/linux" -Iinclude \
              "$JNI_SRC" \
              -Wl,--whole-archive zig-out/lib/libzerodev_aa.a zig-out/lib/libsecp256k1.a -Wl,--no-whole-archive \
              -lc -lm -ldl

            echo "Built: $RESOURCE_DIR/$res_dir/libzerodev_aa.so"
          done

          echo "=== Android native libraries ==="
          find "$RESOURCE_DIR/android-*" -type f -name "libzerodev_aa.*" | sort

      - name: Update version in build.gradle.kts
        run: |
          cd bindings/kotlin
          sed -i '' "s/version = \".*\"/version = \"${{ env.VERSION }}\"/" build.gradle.kts
          echo "Gradle version set to: ${{ env.VERSION }}"

      - name: Build and verify JAR
        run: |
          cd bindings/kotlin
          ./gradlew clean build -x test
          echo "=== JAR contents (native libs) ==="
          jar tf build/libs/zerodev-aa-${{ env.VERSION }}.jar | grep -E "(darwin|linux|android)" || true

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd bindings/kotlin
          ./gradlew publishToCentralPortal

      - name: Tag release
        run: |
          TAG="kotlin-v${{ env.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"
