name: Build xcframework

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')

          # Auto-increment build number: v0.0.1-alpha.1, v0.0.1-alpha.2, ...
          git fetch --tags
          LATEST=$(git tag -l "v${BASE}.*" | sort -t. -k5 -n | tail -1)
          if [ -n "$LATEST" ]; then
            BUILD=$(echo "$LATEST" | grep -o '[0-9]*$')
            BUILD=$((BUILD + 1))
          else
            BUILD=1
          fi

          VERSION="${BASE}.${BUILD}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV
          echo "Building release: v$VERSION"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Switch to CommandLineTools (for Zig libc linkage)
        run: sudo xcode-select -s /Library/Developer/CommandLineTools

      - name: Build macOS targets
        run: |
          for target in aarch64-macos x86_64-macos; do
            echo "=== Building $target ==="
            rm -rf zig-out
            zig build -Doptimize=ReleaseFast -Dtarget=$target -Dstatic-only=true
            mkdir -p dist/$target
            cp zig-out/lib/libzerodev_aa.a dist/$target/
            cp zig-out/lib/libsecp256k1.a dist/$target/

            # Repack with libtool for Xcode compatibility
            for lib in libzerodev_aa.a libsecp256k1.a; do
              tmpdir=$(mktemp -d)
              cd "$tmpdir"
              ar x "$GITHUB_WORKSPACE/dist/$target/$lib"
              chmod 644 *.o
              libtool -static -o "$GITHUB_WORKSPACE/dist/$target/$lib" *.o
              cd "$GITHUB_WORKSPACE"
              rm -rf "$tmpdir"
            done
          done

      - name: Build iOS targets
        run: |
          IOS_SDK=/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk
          SIM_SDK=/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk

          for target_info in "aarch64-ios:$IOS_SDK" "aarch64-ios-simulator:$SIM_SDK" "x86_64-ios-simulator:$SIM_SDK"; do
            target="${target_info%%:*}"
            sdk="${target_info#*:}"
            echo "=== Building $target ==="
            rm -rf zig-out
            DEVELOPER_DIR=/Library/Developer/CommandLineTools \
            C_INCLUDE_PATH="$sdk/usr/include" \
            zig build -Doptimize=ReleaseFast -Dtarget=$target -Dstatic-only=true \
              --sysroot "$sdk"
            mkdir -p dist/$target
            cp zig-out/lib/libzerodev_aa.a dist/$target/
            cp zig-out/lib/libsecp256k1.a dist/$target/

            # Repack with libtool for Xcode compatibility
            for lib in libzerodev_aa.a libsecp256k1.a; do
              tmpdir=$(mktemp -d)
              cd "$tmpdir"
              ar x "$GITHUB_WORKSPACE/dist/$target/$lib"
              chmod 644 *.o
              libtool -static -o "$GITHUB_WORKSPACE/dist/$target/$lib" *.o
              cd "$GITHUB_WORKSPACE"
              rm -rf "$tmpdir"
            done
          done

      - name: Create merged static libs
        run: |
          for target_dir in dist/aarch64-macos dist/x86_64-macos dist/aarch64-ios dist/aarch64-ios-simulator dist/x86_64-ios-simulator; do
            if [ -f "$target_dir/libzerodev_aa.a" ] && [ -f "$target_dir/libsecp256k1.a" ]; then
              libtool -static -o "$target_dir/libZeroDevAA.a" \
                "$target_dir/libzerodev_aa.a" "$target_dir/libsecp256k1.a" 2>/dev/null
              echo "Merged: $target_dir/libZeroDevAA.a"
            fi
          done

      - name: Create fat binaries
        run: |
          # macOS universal (arm64 + x86_64)
          mkdir -p dist/macos-universal
          lipo -create dist/aarch64-macos/libZeroDevAA.a dist/x86_64-macos/libZeroDevAA.a \
               -output dist/macos-universal/libZeroDevAA.a
          echo "macOS universal: $(lipo -info dist/macos-universal/libZeroDevAA.a)"

          # iOS simulator universal (arm64 + x86_64)
          if [ -f dist/aarch64-ios-simulator/libZeroDevAA.a ] && [ -f dist/x86_64-ios-simulator/libZeroDevAA.a ]; then
            mkdir -p dist/ios-simulator-universal
            lipo -create dist/aarch64-ios-simulator/libZeroDevAA.a dist/x86_64-ios-simulator/libZeroDevAA.a \
                 -output dist/ios-simulator-universal/libZeroDevAA.a
            echo "iOS sim universal: $(lipo -info dist/ios-simulator-universal/libZeroDevAA.a)"
          fi

      - name: Switch to Xcode for xcodebuild
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Create xcframework
        run: |
          XCF_ARGS=(-create-xcframework)

          # macOS
          XCF_ARGS+=(-library dist/macos-universal/libZeroDevAA.a -headers include)

          # iOS device
          if [ -f dist/aarch64-ios/libZeroDevAA.a ]; then
            XCF_ARGS+=(-library dist/aarch64-ios/libZeroDevAA.a -headers include)
          fi

          # iOS simulator (universal if both archs available)
          if [ -f dist/ios-simulator-universal/libZeroDevAA.a ]; then
            XCF_ARGS+=(-library dist/ios-simulator-universal/libZeroDevAA.a -headers include)
          elif [ -f dist/aarch64-ios-simulator/libZeroDevAA.a ]; then
            XCF_ARGS+=(-library dist/aarch64-ios-simulator/libZeroDevAA.a -headers include)
          fi

          XCF_ARGS+=(-output dist/ZeroDevAA.xcframework)
          rm -rf dist/ZeroDevAA.xcframework
          xcodebuild "${XCF_ARGS[@]}"

          # Add module map
          for dir in dist/ZeroDevAA.xcframework/*/Headers; do
            cat > "$dir/module.modulemap" << 'EOF'
          module CZeroDevAA {
              header "aa.h"
              export *
          }
          EOF
          done

      - name: Package + checksum
        run: |
          cd dist
          zip -r ZeroDevAA.xcframework.zip ZeroDevAA.xcframework
          CHECKSUM=$(shasum -a 256 ZeroDevAA.xcframework.zip | cut -d' ' -f1)
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV
          echo "SHA256: $CHECKSUM"

      - name: Verify Swift build
        run: |
          sudo xcode-select -s /Library/Developer/CommandLineTools
          cd bindings/swift
          SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk swift build --target ZeroDevAA

      - name: Upload xcframework artifact
        uses: actions/upload-artifact@v5
        with:
          name: ZeroDevAA.xcframework
          path: dist/ZeroDevAA.xcframework.zip

      - name: Update Package.swift and create tag
        run: |
          TAG="${{ env.TAG }}"
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/ZeroDevAA.xcframework.zip"

          # Skip if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            exit 0
          fi

          # Update root Package.swift with correct checksum + URL
          sed -i '' "s|url: \".*ZeroDevAA.xcframework.zip\"|url: \"$URL\"|" Package.swift
          sed -i '' "s|checksum: \".*\"|checksum: \"${{ env.CHECKSUM }}\"|" Package.swift

          # Commit to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Release $TAG — update xcframework checksum [skip ci]"
          git push origin main

          # Create tag on the commit that has the correct checksum
          git tag "$TAG"
          git push origin "$TAG"

          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/ZeroDevAA.xcframework.zip
          body: |
            ## ZeroDevAA xcframework

            **SHA256:** `${{ env.CHECKSUM }}`

            ### Swift Package Manager
            ```swift
            .package(url: "https://github.com/${{ github.repository }}.git", from: "${{ github.event.inputs.version }}")
            ```
